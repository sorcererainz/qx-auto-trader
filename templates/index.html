<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotex Auto Balance</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .terminal {
            background: #0d0d0d;
            border: 2px solid #00ff00;
            border-radius: 10px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 0 30px rgba(0,255,0,0.15);
        }
        .terminal-header {
            background: #1a1a1a;
            padding: 12px 15px;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            border-radius: 8px 8px 0 0;
        }
        .dots { display: flex; gap: 7px; margin-right: 12px; }
        .dot { width: 11px; height: 11px; border-radius: 50%; }
        .dot.red { background: #ff5555; }
        .dot.yellow { background: #ffb86c; }
        .dot.green { background: #50fa7b; }
        .title { color: #00ff00; font-size: 13px; }
        
        .terminal-body { padding: 20px; }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #000;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-size: 15px;
            border-radius: 5px;
            outline: none;
            font-family: 'Courier New', monospace;
        }
        input:focus { box-shadow: 0 0 12px rgba(0,255,0,0.2); }
        
        button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: #00ff00;
            color: #000;
            border: none;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }
        button:active { background: #00cc00; }
        button:disabled { background: #444; color: #888; }
        
        button.secondary {
            background: transparent;
            border: 1px solid #00ff00;
            color: #00ff00;
        }
        
        .balance-card {
            display: none;
            background: #000;
            border: 2px solid #ffd700;
            padding: 25px;
            margin-top: 20px;
            text-align: center;
            border-radius: 8px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 10px rgba(255,215,0,0.3); }
            50% { box-shadow: 0 0 25px rgba(255,215,0,0.6); }
        }
        
        .balance-label { color: #888; font-size: 11px; margin-bottom: 8px; letter-spacing: 2px; }
        .balance-amount { font-size: 42px; color: #ffd700; font-weight: bold; }
        .balance-type { color: #888; font-size: 10px; margin-top: 8px; }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 3px solid #333;
            border-top: 3px solid #00ff00;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error-box {
            display: none;
            color: #ff4444;
            padding: 12px;
            margin-top: 10px;
            background: #1a0000;
            border: 1px solid #ff0000;
            border-radius: 5px;
            text-align: center;
            font-size: 13px;
        }
        
        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 3px;
            font-size: 10px;
            margin-top: 10px;
            background: #001a00;
            border: 1px solid #00ff00;
        }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="terminal-header">
            <div class="dots">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
            </div>
            <div class="title">Q u o t e x _ B a l a n c e _ B o t</div>
        </div>
        
        <div class="terminal-body">
            <div style="margin-bottom: 15px; font-size: 11px; color: #666;">
                > 100% Auto | WebSocket API
            </div>
            
            <input type="email" id="email" placeholder="Email Address" autocomplete="off">
            <input type="password" id="password" placeholder="Password">
            
            <button id="checkBtn" onclick="checkBalance()">
                ▶ GET LIVE BALANCE
            </button>
            
            <button class="secondary" onclick="refillBalance()" style="display:none;" id="refillBtn">
                💎 REFILL DEMO ($10,000)
            </button>
            
            <div class="loading" id="loadingBox">
                <div class="spinner"></div>
                <div style="color: #00ff00;">Connecting to Quotex...</div>
                <div style="font-size: 10px; color: #666;">WebSocket handshake</div>
            </div>
            
            <div class="error-box" id="errorBox"></div>
            
            <div class="balance-card" id="balanceCard">
                <div class="balance-label">💰 LIVE BALANCE</div>
                <div class="balance-amount" id="balanceValue">$0.00</div>
                <div class="balance-type" id="balanceInfo"></div>
                <div class="badge">🟢 LIVE • pyquotex</div>
            </div>
        </div>
    </div>
    
    <script>
        let currentEmail = '';
        let currentPassword = '';
        
        async function checkBalance() {
            currentEmail = document.getElementById('email').value.trim();
            currentPassword = document.getElementById('password').value.trim();
            
            if (!currentEmail || !currentPassword) {
                showError('Please enter email and password');
                return;
            }
            
            // Show loading
            const btn = document.getElementById('checkBtn');
            btn.disabled = true;
            btn.textContent = '⏳ CONNECTING...';
            document.getElementById('loadingBox').style.display = 'block';
            document.getElementById('balanceCard').style.display = 'none';
            document.getElementById('errorBox').style.display = 'none';
            
            try {
                const response = await fetch('/api/check_balance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: currentEmail,
                        password: currentPassword
                    })
                });
                
                const data = await response.json();
                console.log('Response:', data);
                
                if (data.success) {
                    // Show balance
                    document.getElementById('balanceValue').textContent = data.balance;
                    document.getElementById('balanceInfo').textContent = 
                        data.account + ' • ' + data.timestamp;
                    document.getElementById('balanceCard').style.display = 'block';
                    document.getElementById('refillBtn').style.display = 'block';
                    document.getElementById('checkBtn').textContent = '🔄 REFRESH BALANCE';
                } else {
                    showError(data.error || 'Login failed. Check credentials.');
                    document.getElementById('checkBtn').textContent = '▶ GET LIVE BALANCE';
                }
            } catch (error) {
                showError('Network error. Please try again.');
                document.getElementById('checkBtn').textContent = '▶ GET LIVE BALANCE';
                console.error('Error:', error);
            } finally {
                btn.disabled = false;
                document.getElementById('loadingBox').style.display = 'none';
            }
        }
        
        async function refillBalance() {
            if (!confirm('Refill demo balance to $10,000?')) return;
            
            document.getElementById('refillBtn').disabled = true;
            document.getElementById('refillBtn').textContent = '⏳ REFILLING...';
            
            try {
                const response = await fetch('/api/refill_demo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: currentEmail,
                        password: currentPassword
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('balanceValue').textContent = data.balance;
                    alert('✅ Balance refilled to $10,000!');
                }
            } catch (error) {
                alert('Refill failed');
            } finally {
                document.getElementById('refillBtn').disabled = false;
                document.getElementById('refillBtn').textContent = '💎 REFILL DEMO ($10,000)';
            }
        }
        
        function showError(message) {
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = '❌ ' + message;
            errorBox.style.display = 'block';
            setTimeout(() => { errorBox.style.display = 'none'; }, 6000);
        }
        
        // Enter key submit
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkBalance();
        });
    </script>
</body>
</html>
